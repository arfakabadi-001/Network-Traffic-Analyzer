{% extends "base.html" %}
{% block content %}

<h2>Security Alerts</h2>

{% if records %}
<table>
<tr>
    <th>Time</th>
    <th>Source IP</th>
    <th>Protocol</th>
    <th>Alert</th>
</tr>

{% for r in records %}
<tr class="alert">
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
    <td>{{ r[3] }}</td>
    <td>{{ r[6] }}</td>
</tr>
{% endfor %}
</table>
{% else %}
<p>No alerts detected.</p>
{% endif %}

{% endblock %}
